<script>
    // Replace "Copy" text in code block buttons with a clipboard SVG icon
    (function () {
        const clipboardSVG = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>';
        const checkSVG = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>';

        function replaceButtons() {
            document.querySelectorAll('.copyCodeButton').forEach(function (btn) {
                if (!btn.dataset.iconified) {
                    btn.innerHTML = clipboardSVG;
                    btn.dataset.iconified = 'true';
                    btn.title = 'Copy code';

                    // Wrap the original click to show checkmark feedback
                    btn.addEventListener('click', function () {
                        btn.innerHTML = checkSVG;
                        btn.style.color = '#4ade80';
                        setTimeout(function () {
                            btn.innerHTML = clipboardSVG;
                            btn.style.color = '';
                        }, 2000);
                    });
                }
            });
        }

        // Run on load and watch for dynamically added buttons
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', replaceButtons);
        } else {
            replaceButtons();
        }

        // Also observe for any new buttons added dynamically (e.g. by Hugo live reload)
        const observer = new MutationObserver(function () {
            replaceButtons();
        });
        observer.observe(document.body, { childList: true, subtree: true });
    }());
</script>

<script>
    // Force an opaque mobile menu surface regardless of theme cascade.
    (function () {
        const MOBILE_BREAKPOINT = 767;
        const OPAQUE_MENU_BG = '#1f2026';

        function applyOpaqueMobileMenu() {
            const menu = document.getElementById('main-menu');
            if (!menu || window.innerWidth > MOBILE_BREAKPOINT) return;

            menu.style.setProperty('background', OPAQUE_MENU_BG, 'important');
            menu.style.setProperty('background-color', OPAQUE_MENU_BG, 'important');
            menu.style.setProperty('background-image', 'none', 'important');
            menu.style.setProperty('border-color', '#2d3240', 'important');
            menu.style.setProperty('box-shadow', '0 14px 32px rgba(0, 0, 0, 0.45)', 'important');
            menu.style.setProperty('opacity', '1', 'important');
            menu.style.setProperty('backdrop-filter', 'none', 'important');
            menu.style.setProperty('-webkit-backdrop-filter', 'none', 'important');
            menu.style.setProperty('filter', 'none', 'important');
            menu.style.setProperty('mix-blend-mode', 'normal', 'important');
            menu.style.setProperty('isolation', 'isolate', 'important');
        }

        function initOpaqueMobileMenu() {
            applyOpaqueMobileMenu();

            const toggle = document.getElementById('toggle-menu');
            if (toggle) {
                toggle.addEventListener('click', function () {
                    setTimeout(applyOpaqueMobileMenu, 0);
                    setTimeout(applyOpaqueMobileMenu, 120);
                    setTimeout(applyOpaqueMobileMenu, 320);
                });
            }

            window.addEventListener('resize', applyOpaqueMobileMenu);
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initOpaqueMobileMenu);
        } else {
            initOpaqueMobileMenu();
        }
    }());
</script>
